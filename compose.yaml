services:
  resource-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${RESOURCE_DATABASE_NAME}
      POSTGRES_USER: ${RESOURCE_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${RESOURCE_DATASOURCE_PASSWORD}
    ports:
      - "5432:5432"  # Maps container port 5432 to host port 5432
    networks:
      - resource-network
    volumes:
      - ./init-scripts/resource-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  song-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${SONG_DATABASE_NAME}
      POSTGRES_USER: ${SONG_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SONG_DATASOURCE_PASSWORD}
    ports:
      - "5433:5432"  # Maps container port 5432 to host port 5433 (to avoid conflict)
    networks:
      - song-network
    volumes:
      - ./init-scripts/song-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  resource-service:
    build:
      context: ./resource-service
      dockerfile: Dockerfile
    image: resource-service:1.0
    ports:
      - "${RESOURCE_SERVICE_PORT}:${RESOURCE_SERVICE_PORT}"
    environment:
      SERVER_PORT: ${RESOURCE_SERVICE_PORT}
      SPRING_DATASOURCE_URL: ${RESOURCE_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${RESOURCE_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${RESOURCE_DATASOURCE_PASSWORD}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      LOCALSTACK_SERVER_URL: ${LOCALSTACK_SERVER_URL}
      LOCALSTACK_S3_BUCKET_NAME: ${LOCALSTACK_S3_BUCKET_NAME}
      RABBITMQ_SERVER_URL: ${RABBITMQ_SERVER_URL}
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:-true}
    networks:
      - resource-network
      - resource-song-network
      - eureka-server-network
      - rabbitmq-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:${RESOURCE_SERVICE_PORT}/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      resource-db:
        condition: service_healthy
      localstack:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      resource-processor:
        condition: service_healthy

  song-service:
    build:
      context: ./song-service
      dockerfile: Dockerfile
    image: song-service:1.0
    deploy:
      replicas: 2
    ports:
      - "8082-8083:${SONG_SERVICE_PORT}"
    environment:
      SERVER_PORT: ${SONG_SERVICE_PORT}
      SPRING_DATASOURCE_URL: ${SONG_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SONG_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SONG_DATASOURCE_PASSWORD}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:-true}
    networks:
      - song-network
      - resource-song-network
      - eureka-server-network
    depends_on:
      song-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:${SONG_SERVICE_PORT}/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  resource-processor:
    build:
      context: ./resource-processor
      dockerfile: Dockerfile
    image: resource-processor:1.0
    ports:
      - "${RESOURCE_PROCESSOR_PORT}:${RESOURCE_PROCESSOR_PORT}"
    environment:
      SERVER_PORT: ${RESOURCE_PROCESSOR_PORT}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      RABBITMQ_SERVER_URL: ${RABBITMQ_SERVER_URL}
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:-true}
    networks:
      - resource-song-network
      - rabbitmq-network
      - eureka-server-network
    depends_on:
      song-service:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:${RESOURCE_PROCESSOR_PORT}/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    image: eureka-server:1.0
    ports:
      - "${EUREKA_SERVER_PORT}:${EUREKA_SERVER_PORT}"
    environment:
      SERVER_PORT: ${EUREKA_SERVER_PORT}
    networks:
      - eureka-server-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:${EUREKA_SERVER_PORT}/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEBUG: 1
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN}
      LOCALSTACK_S3_BUCKET_NAME: ${LOCALSTACK_S3_BUCKET_NAME}
    volumes:
        - ./init-scripts/localstack/init_s3_bucket.sh:/etc/localstack/init/ready.d/init_s3_bucket.sh  # This script will be executed when LocalStack is ready
    networks:
      - resource-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"    # Broker (AMQP) port
      - "15672:15672"  # Management Web UI port (for you to monitor in browser)
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    networks:
      - rabbitmq-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    image: api-gateway:1.0
    ports:
      - "${API_GATEWAY_PORT}:${API_GATEWAY_PORT}"
    environment:
      SERVER_PORT: ${API_GATEWAY_PORT}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
    networks:
      - eureka-server-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:${API_GATEWAY_PORT}/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      eureka-server:
        condition: service_healthy

networks:
  resource-network:
    name: resource-network
    driver: bridge
  song-network:
    name: song-network
    driver: bridge
  resource-song-network:
    name: resource-song-network
    driver: bridge
  eureka-server-network:
    name: eureka-server
    driver: bridge
  rabbitmq-network:
    name: rabbitmq-network
    driver: bridge


