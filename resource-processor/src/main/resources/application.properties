server.port=8084
spring.application.name=resource-processor

# Eureka Server Configuration
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

# RabbitMQ Connection
spring.rabbitmq.addresses=${RABBITMQ_SERVER_URL:localhost:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:welcome}

# Spring Cloud Stream - Consumer binding
spring.cloud.function.definition=processResourceUploaded
spring.cloud.stream.bindings.processResourceUploaded-in-0.destination=resource-uploaded
spring.cloud.stream.bindings.processResourceUploaded-in-0.group=resource-processor
spring.cloud.stream.bindings.processResourceUploaded-in-0.content-type=application/json