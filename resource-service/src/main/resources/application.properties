server.port=8081
spring.application.name=resource-service

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/resource-db}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Eureka Server Configuration
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.enabled=false

# AWS S3 Configuration for LocalStack
aws.s3.bucket-name=songs
aws.s3.region=us-east-1
aws.s3.endpoint=${LOCALSTACK_SERVER_URL:http://localhost:4566}
aws.s3.access-key=${LOCALSTACK_ACCESS_KEY}
aws.s3.secret-key=${LOCALSTACK_SECRET_KEY}